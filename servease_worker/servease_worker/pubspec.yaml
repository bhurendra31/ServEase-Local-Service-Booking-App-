name: servease_worker
description: "ServEase Worker Application"
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  image_picker: ^1.0.7
  http: ^1.2.0
  cupertino_icons: ^1.0.8

  # 🔥 Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.1.1
  firebase_messaging: ^16.1.0
  flutter_local_notifications: ^17.0.0
  url_launcher: ^6.2.6

  # 📍 Location
  geolocator: ^14.0.2
  google_maps_flutter: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/looogo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"